[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "swiss-road-mobility-mcp"
version = "0.4.0"
description = "MCP Server for Swiss road mobility – shared vehicles (GBFS), EV charging, DATEX II traffic, Park & Rail, multimodal trip planning"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [
    {name = "Schulamt Stadt Zürich"},
]
keywords = [
    "mcp", "model-context-protocol", "shared-mobility", "gbfs",
    "ev-charging", "switzerland", "open-data", "mobility",
    "e-scooter", "e-bike", "car-sharing", "ich-tanke-strom",
    "datex2", "traffic", "verkehrsmeldungen", "astra", "opentransportdata",
    "park-rail", "park-and-ride", "sbb", "multimodal", "intermodal",
    "transport", "fahrplan",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: GIS",
]
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
swiss-road-mobility-mcp = "swiss_road_mobility_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/swiss_road_mobility_mcp"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
ignore = ["E701", "E702"]
