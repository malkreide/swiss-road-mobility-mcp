services:
  - type: web
    name: swiss-road-mobility-mcp
    runtime: python
    buildCommand: pip install .
    startCommand: swiss-road-mobility-mcp
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: "8001"
    plan: free
